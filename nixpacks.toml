[phases.setup]
nixPkgs = ["python311", "python311Packages.pip", "nodejs_20"]

[phases.install]
cmds = [
  "python -m pip install -r requirements.txt",
  "cd frontend && npm install && cd .."
]

[phases.build]
cmds = ["cd frontend && npm run build && cd .."]

[start]
cmd = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
