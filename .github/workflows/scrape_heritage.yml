name: Scrape Heritage Auctions (Monthly)

on:
  schedule:
    - cron: '0 5 1 * *'
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Fetch sales since date (YYYY-MM-DD), default 30 days ago'
        required: false
        default: ''
      max_pages:
        description: 'Max pages to scrape'
        required: false
        default: '20'
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Scrape Heritage
        run: |
          ARGS="--max-pages ${{ github.event.inputs.max_pages || '20' }}"
          if [ -n "${{ github.event.inputs.since_date }}" ]; then
            ARGS="$ARGS --since-date ${{ github.event.inputs.since_date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -u scrape_heritage.py $ARGS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
