name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  # ── Python unit tests (no DB required) ─────────────────────────────────────
  python-unit:
    name: Python unit tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests (no DB)
        run: |
          pytest tests/ -v -m "not db" --tb=short \
            --ignore=tests/test_calculate_fair_price.py \
            --ignore=tests/test_scrape_card_prices.py \
            --ignore=tests/test_catalog_quality.py \
            --ignore=tests/test_csv_security.py \
            --ignore=tests/test_dashboard.py \
            --ignore=tests/test_dashboard_utils.py

  # ── Python DB quality tests (requires live Railway DB) ─────────────────────
  python-db:
    name: Python DB quality tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Only runs on push to main (not PRs) to avoid exposing DATABASE_URL
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run DB quality tests
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pytest tests/test_raw_sales_quality.py tests/test_catalog_quality.py -v -m db --tb=short

  # ── Frontend Vitest ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend component tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: cd frontend && npm install

      - name: Run Vitest
        run: cd frontend && npm test
