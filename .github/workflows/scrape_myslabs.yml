name: Scrape Myslabs (Weekly)

on:
  schedule:
    - cron: '0 4 * * 0'
  workflow_dispatch:
    inputs:
      since_date:
        description: 'Fetch sales since date (YYYY-MM-DD), default 7 days ago'
        required: false
        default: ''
      dry_run:
        description: 'Dry run (no DB writes)'
        required: false
        default: 'false'

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Scrape Myslabs
        run: |
          ARGS="--max-pages 50"
          if [ -n "${{ github.event.inputs.since_date }}" ]; then
            ARGS="$ARGS --since-date ${{ github.event.inputs.since_date }}"
          fi
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            ARGS="$ARGS --dry-run"
          fi
          python -u scrape_myslabs.py $ARGS
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
