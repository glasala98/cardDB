name: Daily Card Price Scrape

on:
  schedule:
    - cron: '0 8 * * *'  # 8am UTC daily (3am EST / midnight PST)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y

      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy

      - name: Open SSH tunnel to home server DB
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SERVER_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p ${{ secrets.SERVER_SSH_PORT }} ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts
          ssh -fN -L 5432:localhost:5432 \
            -p ${{ secrets.SERVER_SSH_PORT }} \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
            -i ~/.ssh/id_ed25519

      - name: Run scraper
        run: python daily_scrape.py --workers 3
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
