name: Scrape Validation

# Fires after catalog_tier_base completes, or run manually via workflow_dispatch.
# Checks that shards actually wrote data — not just that they ran.

on:
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Look back N hours for new prices (default: 7)'
        required: false
        default: '7'
  workflow_run:
    workflows: ["Catalog Tier — Base (Daily during backfill)"]
    types: [completed]

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Validate scrape output
        id: validate
        run: |
          python - <<'EOF'
          import os, psycopg2, sys, hashlib
          from datetime import datetime, timezone

          WINDOW_HOURS = int(os.environ.get("WINDOW_HOURS", 7))

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur  = conn.cursor()

          # New prices by sport in the window
          cur.execute("""
              SELECT cc.sport, COUNT(*) AS new_prices
              FROM market_prices mp
              JOIN card_catalog cc ON cc.id = mp.card_catalog_id
              WHERE mp.scraped_at >= NOW() - INTERVAL '%s hours'
                AND cc.scrape_tier = 'base'
              GROUP BY cc.sport ORDER BY cc.sport
          """, (WINDOW_HOURS,))
          rows = cur.fetchall()

          # New raw sales in the window
          cur.execute("""
              SELECT COUNT(*) FROM market_raw_sales
              WHERE created_at >= NOW() - INTERVAL '%s hours'
          """, (WINDOW_HOURS,))
          new_sales = cur.fetchone()[0]

          cur.close(); conn.close()

          now = datetime.now(timezone.utc).strftime("%b %d %Y at %H:%M UTC")
          total_new = sum(r[1] for r in rows)
          by_sport  = dict(rows)

          print(f"Validation — last {WINDOW_HOURS}h — {now}")
          print(f"New prices: {total_new:,}")
          for sport, cnt in rows:
              print(f"  {sport}: {cnt:,}")
          print(f"New raw sales: {new_sales:,}")

          issues = []
          if total_new == 0:
              issues.append("ZERO new prices — all shards may have been blocked")
          for sport in ["NFL", "NBA", "MLB"]:
              cnt = by_sport.get(sport, 0)
              if cnt == 0:
                  issues.append(f"{sport}: 0 new prices — shard(s) failed")
              elif cnt < 1000:
                  issues.append(f"{sport}: only {cnt:,} prices — unexpectedly low")

          sport_lines = "".join(f"  {s}: {c:,}\n" for s, c in rows)
          status_line = "✅ PASS — all sports healthy" if not issues else "⚠️ ISSUES:\n" + "\n".join(f"  - {i}" for i in issues)

          body = f"""Scrape Validation — {now}
Window: last {WINDOW_HOURS} hours

New prices written: {total_new:,}
{sport_lines}
New raw sales:      {new_sales:,}

{status_line}
"""
          emoji   = "✅" if not issues else "⚠️"
          subject = f"{emoji} CardDB scrape validation — {total_new:,} new prices ({WINDOW_HOURS}h)"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              delim = "EOF_" + hashlib.md5(body.encode()).hexdigest()[:8]
              f.write(f"body<<{delim}\n{body}\n{delim}\n")
              f.write(f"subject={subject}\n")

          if issues:
              sys.exit(1)
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '7' }}

      - name: Send validation email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CardDB Monitor <${{ secrets.NOTIFY_GMAIL_USER }}>"
          subject: ${{ steps.validate.outputs.subject }}
          body: ${{ steps.validate.outputs.body }}
