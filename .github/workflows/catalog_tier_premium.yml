name: Catalog Tier — Premium (Weekly)

on:
  schedule:
    - cron: '0 10 * * *'  # 10am UTC daily (backfill mode — revert to weekly after done)
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport (NHL/NBA/NFL/MLB, blank=all)'
        required: false
        default: ''
      limit:
        description: 'Max cards per sport (0=all)'
        required: false
        default: '0'

jobs:
  scrape-premium-nhl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'NHL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NHL premium prices
        run: python -u scraping/scrape_master_db.py --catalog-tier premium --sport NHL --workers 5 --stale-days 7 --max-hours 4.5 --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-premium-nba:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'NBA' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NBA premium prices
        run: python -u scraping/scrape_master_db.py --catalog-tier premium --sport NBA --workers 5 --stale-days 7 --max-hours 4.5 --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-premium-nfl:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'NFL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NFL premium prices
        run: python -u scraping/scrape_master_db.py --catalog-tier premium --sport NFL --workers 5 --stale-days 7 --max-hours 4.5 --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-premium-mlb:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'MLB' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
