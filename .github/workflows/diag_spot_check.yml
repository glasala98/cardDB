name: Spot Check — Raw Sales Data Quality
on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'  # every 6 hours while backfill is running
jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - run: python diagnostics/diag_spot_check.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
