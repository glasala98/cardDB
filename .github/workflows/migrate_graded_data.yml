name: Migrate — Add graded_data to market_prices

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - run: python migrate_add_graded_data.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
