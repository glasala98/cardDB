name: Validate Scrape Run

# Fires after catalog_tier_base completes, or manually.
# Checks that shards actually wrote data — not just that they ran.

on:
  workflow_run:
    workflows: ["Catalog Tier — Base (Daily during backfill)"]
    types: [completed]
  workflow_dispatch:
    inputs:
      window_hours:
        description: 'Look back N hours for new prices (default: 7)'
        required: false
        default: '7'

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install psycopg2-binary

      - name: Validate scrape output
        id: validate
        run: |
          python - <<'EOF'
          import os, psycopg2, sys
          from datetime import datetime, timezone

          WINDOW_HOURS = int(os.environ.get("WINDOW_HOURS", 7))

          conn = psycopg2.connect(os.environ["DATABASE_URL"])
          cur  = conn.cursor()

          # Cards priced in the last WINDOW_HOURS hours, by sport
          cur.execute("""
              SELECT cc.sport, COUNT(*) AS new_prices
              FROM market_prices mp
              JOIN card_catalog cc ON cc.id = mp.card_catalog_id
              WHERE mp.scraped_at >= NOW() - INTERVAL '%s hours'
                AND cc.scrape_tier = 'base'
              GROUP BY cc.sport
              ORDER BY cc.sport
          """, (WINDOW_HOURS,))
          rows = cur.fetchall()

          # Raw sales added in last WINDOW_HOURS hours
          cur.execute("""
              SELECT COUNT(*) FROM market_raw_sales
              WHERE created_at >= NOW() - INTERVAL '%s hours'
          """, (WINDOW_HOURS,))
          new_sales = cur.fetchone()[0]

          cur.close(); conn.close()

          now = datetime.now(timezone.utc).strftime("%b %d %Y at %H:%M UTC")
          total_new = sum(r[1] for r in rows)

          print(f"Scrape validation — last {WINDOW_HOURS}h — {now}")
          print(f"New prices written: {total_new:,}")
          for sport, cnt in rows:
              print(f"  {sport}: {cnt:,}")
          print(f"New raw sales: {new_sales:,}")

          # Fail if nothing was written
          issues = []
          if total_new == 0:
              issues.append("ZERO new prices written — scraper may have failed or all shards were blocked")
          for sport in ["NFL", "NBA", "MLB"]:
              sport_cnt = dict(rows).get(sport, 0)
              if sport_cnt == 0:
                  issues.append(f"{sport}: 0 new prices — shard(s) may have failed")
              elif sport_cnt < 1000:
                  issues.append(f"{sport}: only {sport_cnt:,} new prices — unexpectedly low")

          if issues:
              print("\n⚠️  ISSUES DETECTED:")
              for issue in issues:
                  print(f"  - {issue}")
              status = "fail"
          else:
              print(f"\n✅ All sports wrote data — scrape looks healthy")
              status = "pass"

          import hashlib
          body = f"""Scrape Validation — {now}

Window: last {WINDOW_HOURS} hours

New prices written: {total_new:,}
{"".join(f"  {s}: {c:,}\n" for s, c in rows)}
New raw sales: {new_sales:,}

{"✅ PASS — all sports healthy" if not issues else "⚠️ ISSUES:" + chr(10) + chr(10).join(f"  - {i}" for i in issues)}
"""
          subject = f"{'✅' if not issues else '⚠️'} CardDB scrape — {total_new:,} new prices | {now}"

          with open(os.environ["GITHUB_OUTPUT"], "a") as f:
              delim = "EOF_" + hashlib.md5(body.encode()).hexdigest()[:8]
              f.write(f"body<<{delim}\n{body}\n{delim}\n")
              f.write(f"subject={subject}\n")
              f.write(f"status={status}\n")
              f.write(f"total_new={total_new}\n")

          if issues:
              sys.exit(1)
          EOF
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          WINDOW_HOURS: ${{ github.event.inputs.window_hours || '7' }}

      - name: Send validation email
        if: always()
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CardDB Monitor <${{ secrets.NOTIFY_GMAIL_USER }}>"
          subject: ${{ steps.validate.outputs.subject }}
          body: ${{ steps.validate.outputs.body }}
