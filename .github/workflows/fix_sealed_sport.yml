name: Fix Sealed Products Sport Mismatch

on:
  workflow_dispatch:

jobs:
  fix:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Python dependencies
        run: pip install -r requirements.txt
      - name: Run sport mismatch cleanup
        run: python -u scripts/fix_sealed_products_sport.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
