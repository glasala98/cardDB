name: Export ML Dataset

on:
  workflow_dispatch:
    inputs:
      days:
        description: "Days of history to export"
        default: "730"
      min_sales:
        description: "Min sales per player to include"
        default: "3"
  schedule:
    - cron: "0 3 1 * *"  # 1st of month, 3am UTC

jobs:
  export:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Export ML dataset
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python scripts/export_ml_dataset.py \
            --out /tmp/sales_ml.csv \
            --days ${{ github.event.inputs.days || '730' }} \
            --min-sales ${{ github.event.inputs.min_sales || '3' }}

      - name: Run ANALYZE on market_raw_sales
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          python -c "
          from db import get_db
          with get_db() as conn:
              conn.autocommit = True
              with conn.cursor() as cur:
                  cur.execute('ANALYZE market_raw_sales')
                  cur.execute('ANALYZE card_catalog')
                  cur.execute('ANALYZE market_prices')
          print('ANALYZE complete')
          "

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sales_ml_${{ github.run_id }}
          path: /tmp/sales_ml.csv
          retention-days: 30
