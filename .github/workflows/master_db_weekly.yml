name: Master DB Weekly Scrape (Graded + Rookies + Bios)

on:
  schedule:
    - cron: '0 7 * * 0'  # 7am UTC every Sunday (2am EST)
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport (NHL/NBA/NFL/MLB)'
        required: false
        default: 'NHL'
      limit:
        description: 'Max cards for graded scrape (0=all)'
        required: false
        default: '500'

jobs:
  graded-nhl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NHL rookies (full weekly refresh)
        run: python -u scraping/scrape_master_db.py --sport NHL --tier rookies --workers 5 --stale-days 7
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Scrape NHL graded prices (PSA/BGS)
        run: python -u scraping/scrape_master_db.py --sport NHL --graded --workers 5 --stale-days 30 --limit ${{ github.event.inputs.limit || '500' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Scrape NHL stats + player bios
        run: python -u scrape_nhl_stats.py --fetch-bios
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  graded-nba:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NBA rookies + graded
        run: |
          python -u scraping/scrape_master_db.py --sport NBA --tier rookies --workers 5 --stale-days 7
          python -u scraping/scrape_master_db.py --sport NBA --graded --workers 5 --stale-days 30 --limit 300
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  graded-nfl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NFL rookies + graded
        run: |
          python -u scraping/scrape_master_db.py --sport NFL --tier rookies --workers 5 --stale-days 7
          python -u scraping/scrape_master_db.py --sport NFL --graded --workers 5 --stale-days 30 --limit 300
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  graded-mlb:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape MLB rookies + graded
        run: |
          python -u scraping/scrape_master_db.py --sport MLB --tier rookies --workers 5 --stale-days 7
          python -u scraping/scrape_master_db.py --sport MLB --graded --workers 5 --stale-days 30 --limit 300
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
