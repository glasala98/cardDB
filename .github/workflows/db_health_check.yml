name: DB Health Check (Daily)

# Runs every morning before the scrape workflows.
# Fails loudly if disk usage is above 80%, blocking nothing but creating a
# visible red X on the Actions tab before the expensive jobs even start.

on:
  schedule:
    - cron: '0 5 * * *'  # 5am UTC — 1hr before scrapes at 6am
  workflow_dispatch:
    inputs:
      volume_gb:
        description: 'Railway volume size in GB'
        required: false
        default: '50'

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - name: Check DB disk usage
        run: python preflight_db_check.py --volume-gb ${{ github.event.inputs.volume_gb || '50' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
