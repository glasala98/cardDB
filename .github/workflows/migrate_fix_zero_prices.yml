name: Migrate — Fix Zero/Negative Prices

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - name: Run migration
        run: python migrate_fix_zero_prices.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
