name: Catalog Tier — Base (Daily during backfill)

# Scrapes price data for base-tier cards (modern era only — 2015+).
# Pre-2015 base cards have very low eBay sold activity so are skipped to reduce
# time wasted on dead cards. Override with year_from=2010 for older card coverage.
# Running daily during initial backfill. Once all base cards have been priced
# once, stale-days=30 means each run is tiny (only repricing month-old cards).
# Switch back to weekly (0 6 * * 3) after backfill is complete.
#
# Sharding: each sport is split across N parallel runners (each with a different
# GH Actions IP → independent eBay rate limit). Shard counts:
#   NFL: 5 shards (372K cards)   NBA: 4 shards (244K cards)
#   MLB: 3 shards                NHL: skipped (89%+ miss rate on base cards)
# = 12 parallel runners. 3 runs/day (6am/noon/6pm UTC) → ~135K cards/day → ~7 day backfill.

on:
  schedule:
    - cron: '0 6 * * *'    # 6am  UTC — run 1 of 3
    - cron: '0 12 * * *'   # noon UTC — run 2 of 3
    - cron: '0 18 * * *'   # 6pm  UTC — run 3 of 3
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport (NHL/NBA/NFL/MLB, blank=all)'
        required: false
        default: ''
      year_from:
        description: 'Start year (default: 2015)'
        required: false
        default: '2015'
      limit:
        description: 'Max cards per shard (0=all)'
        required: false
        default: '0'
      stale_days:
        description: 'Re-scrape if older than N days (default: 30)'
        required: false
        default: '30'

concurrency:
  group: base-scrape
  cancel-in-progress: true

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - name: Check DB disk usage (fail if >90% of 50GB volume)
        run: python preflight_db_check.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        include:
          # NFL — 5 shards (~74K cards each)
          - { sport: NFL, shard_index: 0, shard_count: 5 }
          - { sport: NFL, shard_index: 1, shard_count: 5 }
          - { sport: NFL, shard_index: 2, shard_count: 5 }
          - { sport: NFL, shard_index: 3, shard_count: 5 }
          - { sport: NFL, shard_index: 4, shard_count: 5 }
          # NBA — 4 shards (~61K cards each)
          - { sport: NBA, shard_index: 0, shard_count: 4 }
          - { sport: NBA, shard_index: 1, shard_count: 4 }
          - { sport: NBA, shard_index: 2, shard_count: 4 }
          - { sport: NBA, shard_index: 3, shard_count: 4 }
          # MLB — 3 shards (~60K cards each)
          - { sport: MLB, shard_index: 0, shard_count: 3 }
          - { sport: MLB, shard_index: 1, shard_count: 3 }
          - { sport: MLB, shard_index: 2, shard_count: 3 }
          # NHL — skipped from base backfill (89%+ miss rate; revisit after other sports done)

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y

      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy

      # Notify once per sport (shard 0 only) to avoid 10 duplicate emails
      - name: Notify — scrape started
        if: matrix.shard_index == 0
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CardDB Monitor <${{ secrets.NOTIFY_GMAIL_USER }}>"
          subject: "▶️ CardDB — Base scrape started: ${{ matrix.sport }} (${{ matrix.shard_count }} shards)"
          body: |
            ${{ matrix.sport }} base-tier scrape has started (${{ matrix.shard_count }} parallel shards).

            Triggered by: ${{ github.event_name }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Scrape base prices
        if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == matrix.sport }}
        run: |
          python -u scrape_master_db.py \
            --catalog-tier base \
            --sport ${{ matrix.sport }} \
            --workers 5 \
            --year-from ${{ github.event.inputs.year_from || '2015' }} \
            --stale-days ${{ github.event.inputs.stale_days || '30' }} \
            --limit ${{ github.event.inputs.limit || '0' }} \
            --shard-index ${{ matrix.shard_index }} \
            --shard-count ${{ matrix.shard_count }} \
            --max-hours 5.75
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Generate cancellation report
        id: cancel_report
        if: cancelled() && matrix.shard_index == 0
        continue-on-error: true
        run: |
          pip install psycopg2-binary -q
          DB_SIZE=$(python -c "
          import os, psycopg2
          try:
              conn = psycopg2.connect(os.environ['DATABASE_URL'])
              cur = conn.cursor()
              cur.execute(\"SELECT pg_size_pretty(pg_database_size(current_database()))\")
              print(cur.fetchone()[0])
              cur.close(); conn.close()
          except:
              print('unavailable')
          ")
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Notify cancel once per sport (shard 0 only)
      - name: Notify — scrape cancelled
        if: cancelled() && matrix.shard_index == 0
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CardDB Monitor <${{ secrets.NOTIFY_GMAIL_USER }}>"
          subject: "⚠️ CardDB — Base scrape STOPPED early: ${{ matrix.sport }}"
          body: |
            ${{ matrix.sport }} base-tier scrape was STOPPED before completing.

            DB size at cancellation: ${{ steps.cancel_report.outputs.db_size }}

            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            To restart ${{ matrix.sport }} only:
              gh workflow run catalog_tier_base.yml --ref main -f sport=${{ matrix.sport }}
