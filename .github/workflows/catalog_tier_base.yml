name: Catalog Tier — Base (Daily during backfill)

# Scrapes price data for base-tier cards (modern era only — 2010+).
# Pre-2010 base cards typically have no eBay sold activity so are skipped.
# Running daily during initial backfill. Once all base cards have been priced
# once, stale-days=30 means each run is tiny (only repricing month-old cards).
# Switch back to weekly (0 6 * * 3) after backfill is complete.

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily during backfill
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport (NHL/NBA/NFL/MLB, blank=all)'
        required: false
        default: ''
      year_from:
        description: 'Start year (default: 2010)'
        required: false
        default: '2010'
      limit:
        description: 'Max cards per sport (0=all)'
        required: false
        default: '0'
      stale_days:
        description: 'Re-scrape if older than N days (default: 30)'
        required: false
        default: '30'

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - name: Check DB disk usage (fail if >90% of 50GB volume)
        run: python preflight_db_check.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-base-nhl:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'NHL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NHL base prices
        run: |
          python -u scrape_master_db.py \
            --catalog-tier base \
            --sport NHL \
            --workers 5 \
            --year-from ${{ github.event.inputs.year_from || '2010' }} \
            --stale-days ${{ github.event.inputs.stale_days || '30' }} \
            --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-base-nba:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'NBA' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NBA base prices
        run: |
          python -u scrape_master_db.py \
            --catalog-tier base \
            --sport NBA \
            --workers 5 \
            --year-from ${{ github.event.inputs.year_from || '2010' }} \
            --stale-days ${{ github.event.inputs.stale_days || '30' }} \
            --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-base-nfl:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'NFL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NFL base prices
        run: |
          python -u scrape_master_db.py \
            --catalog-tier base \
            --sport NFL \
            --workers 5 \
            --year-from ${{ github.event.inputs.year_from || '2010' }} \
            --stale-days ${{ github.event.inputs.stale_days || '30' }} \
            --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-base-mlb:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 360
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'MLB' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape MLB base prices
        run: |
          python -u scrape_master_db.py \
            --catalog-tier base \
            --sport MLB \
            --workers 5 \
            --year-from ${{ github.event.inputs.year_from || '2010' }} \
            --stale-days ${{ github.event.inputs.stale_days || '30' }} \
            --limit ${{ github.event.inputs.limit || '0' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
