name: Master DB Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily (1am EST)
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport to scrape (NHL/NBA/NFL/MLB/ALL)'
        required: false
        default: 'ALL'
      limit:
        description: 'Max cards per sport (0=all)'
        required: false
        default: '1000'

jobs:
  preflight:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: pip install psycopg2-binary
      - name: Check DB disk usage (fail if >90% of 50GB volume)
        run: python preflight_db_check.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-nhl:
    needs: preflight
    runs-on: ubuntu-latest
    timeout-minutes: 300
    if: ${{ github.event.inputs.sport == '' || github.event.inputs.sport == 'ALL' || github.event.inputs.sport == 'NHL' }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Notify — NHL scrape started
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CardDB Monitor <${{ secrets.NOTIFY_GMAIL_USER }}>"
          subject: "▶️ CardDB — Master DB scrape started: NHL"
          body: |
            NHL master DB scrape has started successfully.

            Triggered by: ${{ github.event_name }}
            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
      - name: Scrape NHL prices
        run: python -u scrape_master_db.py --sport NHL --workers 5 --stale-days 7 --limit ${{ github.event.inputs.limit || '1000' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Scrape NHL player stats
        run: python -u scrape_nhl_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Generate cancellation report
        id: cancel_report
        if: cancelled()
        continue-on-error: true
        run: |
          pip install psycopg2-binary -q
          DB_SIZE=$(python -c "
          import os, psycopg2
          try:
              conn = psycopg2.connect(os.environ['DATABASE_URL'])
              cur = conn.cursor()
              cur.execute(\"SELECT pg_size_pretty(pg_database_size(current_database()))\")
              print(cur.fetchone()[0])
              cur.close(); conn.close()
          except:
              print('unavailable')
          ")
          echo "db_size=$DB_SIZE" >> $GITHUB_OUTPUT
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Notify — NHL scrape cancelled
        if: cancelled()
        continue-on-error: true
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.NOTIFY_GMAIL_USER }}
          password: ${{ secrets.NOTIFY_GMAIL_APP_PASSWORD }}
          to: ${{ secrets.NOTIFY_EMAIL_TO }}
          from: "CardDB Monitor <${{ secrets.NOTIFY_GMAIL_USER }}>"
          subject: "⚠️ CardDB — Master DB scrape STOPPED early: NHL"
          body: |
            NHL master DB scrape was STOPPED before completing.

            DB size at cancellation: ${{ steps.cancel_report.outputs.db_size }}

            Run: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

            To restart NHL only:
              gh workflow run master_db_daily.yml --ref main -f sport=NHL

