name: Master DB Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily (1am EST)
  workflow_dispatch:
    inputs:
      sport:
        description: 'Sport to scrape (NHL/NBA/NFL/MLB/ALL)'
        required: false
        default: 'ALL'
      limit:
        description: 'Max cards per sport (0=all)'
        required: false
        default: '2000'

jobs:
  scrape-nhl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NHL prices
        run: python -u scrape_master_db.py --sport NHL --workers 5 --limit ${{ github.event.inputs.limit || '2000' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
      - name: Scrape NHL player stats
        run: python -u scrape_nhl_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-nba:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NBA prices
        run: python -u scrape_master_db.py --sport NBA --workers 5 --limit ${{ github.event.inputs.limit || '2000' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-nfl:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape NFL prices
        run: python -u scrape_master_db.py --sport NFL --workers 5 --limit ${{ github.event.inputs.limit || '2000' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  scrape-mlb:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y
      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy
      - name: Scrape MLB prices
        run: python -u scrape_master_db.py --sport MLB --workers 5 --limit ${{ github.event.inputs.limit || '2000' }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
