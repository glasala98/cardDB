name: Master DB Daily Scrape

on:
  schedule:
    - cron: '0 6 * * *'  # 6am UTC daily (1am EST / 10pm PST)
  workflow_dispatch:       # Allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Chrome
        run: |
          wget -q -O /tmp/chrome.deb https://dl.google.com/linux/direct/google-chrome-stable_current_amd64.deb
          sudo apt-get install -y /tmp/chrome.deb || sudo apt-get -f install -y

      - name: Install Python dependencies
        run: pip install -r requirements.txt webdriver-manager scipy

      - name: Scrape raw card prices
        run: python -u scrape_master_db.py --workers 5
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Scrape NHL player stats
        run: python -u scrape_nhl_stats.py
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
